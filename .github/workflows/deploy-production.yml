name: Deploy to Production (GoDaddy)

# Deploys "NRC Website/dist/" to the dedicated GoDaddy FTP account whose
# root is already restricted to the production deploy directory
# (/home/r6ao2l85imqw/public_html/nrculture.com/deploy). See DEPLOYMENT.md
# before running this for the first time.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run -- log what would change, upload nothing"
        type: boolean
        default: true
        required: true

# Only one deployment runs at a time; a newer push cancels an in-flight
# older one rather than racing it.
concurrency:
  group: nrc-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "NRC Website"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js 20
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "NRC Website/package-lock.json"

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build (Vite)
        env:
          VITE_DISCOVERY_FORM_ENDPOINT: ${{ secrets.VITE_DISCOVERY_FORM_ENDPOINT }}
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "::error::dist/index.html is missing after build -- aborting deployment."
            exit 1
          fi
          if [ ! -f "dist/privacy.html" ]; then
            echo "::error::dist/privacy.html is missing after build -- aborting deployment."
            exit 1
          fi
          echo "Build output (this is exactly what will be considered for deployment):"
          find dist -type f | sort

      - name: Determine dry-run mode
        id: dryrun
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "==> DRY RUN: no files will be uploaded. This only lists what would change."
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "==> REAL DEPLOYMENT: files will be uploaded to the production FTP account."
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      # Diagnostic only -- added after a run failed with
      # "Error: Timeout (control socket)" from the FTP-Deploy-Action step
      # below. That error means the runner's very first raw TCP connection
      # attempt to the FTP server got no response at all -- before login,
      # before any FTPS/TLS negotiation. That's consistent with either (a)
      # GoDaddy's firewall/WAF silently dropping connections from GitHub's
      # shared, constantly-rotating runner IP ranges, or (b) a wrong
      # hostname/port in GODADDY_FTP_SERVER. This step isolates which, by
      # attempting a bare TCP connect with its own short timeout and a
      # DNS lookup, independent of the FTP library. It never fails the
      # job (continue-on-error) and never touches the deploy directory --
      # remove it once the root cause is confirmed and fixed.
      - name: Diagnose FTP connectivity (no login attempted)
        continue-on-error: true
        env:
          FTP_HOST: ${{ secrets.GODADDY_FTP_SERVER }}
        run: |
          echo "Resolving $FTP_HOST ..."
          getent hosts "$FTP_HOST" || echo "::warning::DNS lookup failed or returned nothing -- check the GODADDY_FTP_SERVER secret value against exactly what cPanel's FTP Accounts page shows."

          echo ""
          echo "Attempting raw TCP connect to $FTP_HOST:21 (8s timeout, no credentials sent) ..."
          if timeout 8 bash -c "exec 3<>/dev/tcp/$FTP_HOST/21 && echo CONNECTED && exec 3<&-"; then
            echo "==> Port 21 is reachable from this runner. The earlier failure is more likely FTPS/TLS negotiation, an account-side issue, or intermittent -- not a firewall drop."
          else
            echo "::warning::Could not open a TCP connection to $FTP_HOST:21 within 8s. This points to the connection being blocked or silently dropped (most likely GoDaddy's firewall/WAF rejecting GitHub Actions' runner IP range), not a credentials or FTPS/TLS problem. Ask GoDaddy support whether FTP access for this account is restricted by source IP, since GitHub Actions IPs are shared and rotate constantly and can't be permanently allow-listed."
          fi

      - name: Deploy to GoDaddy (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.GODADDY_FTP_SERVER }}
          username: ${{ secrets.GODADDY_FTP_USERNAME }}
          password: ${{ secrets.GODADDY_FTP_PASSWORD }}
          protocol: ftps
          # This account's FTP root is already restricted to the production
          # deploy directory (a dedicated FTP account, not the primary
          # cPanel account) -- so "./" is the deploy directory itself, not
          # the wider hosting account. Do not change this to
          # "public_html/nrculture.com/deploy/" while using that dedicated
          # account, or paths would resolve one level too deep.
          server-dir: ./
          local-dir: "NRC Website/dist/"
          # State-based sync: files removed from this build (e.g. old
          # hashed assets from a previous build) are removed on the server
          # too, but only files this action itself has ever deployed --
          # never a bulk wipe of server-dir.
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.DS_Store
          log-level: verbose
          dry-run: ${{ steps.dryrun.outputs.value }}
