<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NRC FBX Character Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ivory: #f5f0e8;
      --ivory-dark: #e9dfd0;
      --charcoal: #1c1917;
      --muted: rgba(28,25,23,0.56);
      --gold: #c9a96e;
      --sage: #7a8c78;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--ivory);
      color: var(--charcoal);
      font-family: 'Inter', sans-serif;
    }

    .preview {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 74% 42%, rgba(201,169,110,0.14), transparent 34%),
        linear-gradient(135deg, var(--ivory), var(--ivory-dark));
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel {
      position: absolute;
      left: clamp(24px, 6vw, 72px);
      top: clamp(24px, 6vw, 72px);
      z-index: 2;
      max-width: 360px;
      pointer-events: none;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      color: var(--sage);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .label::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--sage);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 5vw, 72px);
      font-weight: 300;
      line-height: 1.04;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    p {
      max-width: 320px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.85;
    }

    .status {
      position: absolute;
      right: clamp(20px, 4vw, 48px);
      bottom: clamp(18px, 4vw, 42px);
      z-index: 2;
      color: rgba(28,25,23,0.48);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="preview">
    <canvas id="preview-canvas"></canvas>
    <section class="panel" aria-label="FBX preview details">
      <div class="label">FBX Preview</div>
      <h1>Standing Greeting</h1>
      <p>Temporary Three.js preview using placeholder ivory and bronze materials. Orbit controls are enabled for inspection.</p>
    </section>
    <div class="status" id="status">Loading model</div>
  </main>

  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/examples/jsm/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

    const canvas = document.getElementById('preview-canvas');
    const status = document.getElementById('status');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0xf5f0e8, 0);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0xf5f0e8, 0.012);

    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 300);
    camera.position.set(0, 1.85, 6.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.45, 0);
    controls.minDistance = 3.2;
    controls.maxDistance = 10;
    controls.maxPolarAngle = Math.PI * 0.52;

    scene.add(new THREE.HemisphereLight(0xfffbf2, 0xb9a58d, 1.85));

    const keyLight = new THREE.DirectionalLight(0xfff2d8, 3.1);
    keyLight.position.set(4.5, 6.5, 5.5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xbfcab8, 0.9);
    fillLight.position.set(-4, 3, 3);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xd7bd82, 1.15);
    rimLight.position.set(-3, 4, -4);
    scene.add(rimLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(4.6, 96),
      new THREE.MeshStandardMaterial({
        color: 0xefe6d8,
        roughness: 0.94,
        metalness: 0.0,
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: 0xe8dcc8,
      roughness: 0.78,
      metalness: 0.02,
    });

    const accentMaterial = new THREE.MeshStandardMaterial({
      color: 0x9d6a42,
      roughness: 0.66,
      metalness: 0.18,
    });

    const loader = new FBXLoader();
    const clock = new THREE.Clock();
    let mixer;
    let model;

    loader.load(
      '/models/standing-greeting.fbx',
      (fbx) => {
        model = fbx;
        model.traverse((node) => {
          if (!node.isMesh && !node.isSkinnedMesh) return;
          node.castShadow = true;
          node.receiveShadow = true;
          node.frustumCulled = false;
          node.material = /joint/i.test(node.name) ? accentMaterial : bodyMaterial;
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const scale = 2.65 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        const normalizedBox = new THREE.Box3().setFromObject(model);
        model.position.y -= normalizedBox.min.y;
        model.rotation.y = Math.PI - 0.18;
        scene.add(model);

        if (model.animations.length) {
          mixer = new THREE.AnimationMixer(model);
          const clip = model.animations.find((item) => item.tracks.length > 0) || model.animations[0];
          const action = mixer.clipAction(clip);
          action.reset().fadeIn(0.25).play();
          status.textContent = `Playing ${clip.name || 'animation'}`;
        } else {
          status.textContent = 'Loaded without animation';
        }
      },
      (event) => {
        if (!event.total) return;
        const progress = Math.round((event.loaded / event.total) * 100);
        status.textContent = `Loading model ${progress}%`;
      },
      (error) => {
        console.error(error);
        status.textContent = 'Model failed to load';
      }
    );

    function resize() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    window.addEventListener('resize', resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      if (mixer) mixer.update(delta);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
